<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — The Officer's Ascent</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body>
<div id="mobileTopbar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <span class="topbar-title" style="color:var(--accent-gold);">⚡ ADMIN COMMAND CENTER</span>
      <div class="topbar-right"><span class="topbar-time" id="topbarTime"></span></div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1 style="color:var(--accent-gold);">ADMIN DASHBOARD</h1>
          <p>Platform overview and quick controls</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid mb-24" id="statsGrid"></div>

      <!-- Quick Admin Actions -->
      <div class="card mb-24">
        <div class="card-title" style="color:var(--accent-gold);">⚡ QUICK ACTIONS</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">
          <a href="manage-members.html" class="btn btn-gold"><span>👥</span> Manage Members</a>
          <a href="manage-tasks.html" class="btn btn-primary"><span>📌</span> Manage Tasks</a>
          <a href="manage-quizzes.html" class="btn btn-success"><span>🧠</span> Manage Quizzes</a>
          <a href="manage-study.html" class="btn btn-primary"><span>📚</span> Study Materials</a>
          <a href="analytics.html" class="btn btn-success"><span>📊</span> Analytics</a>
          <a href="settings.html" class="btn btn-gold"><span>⚙️</span> Site Settings</a>
        </div>
      </div>

      <!-- Announcement Banner Control -->
      <div class="card mb-24" style="border-color:rgba(255,215,0,0.3);">
        <div class="card-title" style="color:var(--accent-gold);">📢 ANNOUNCEMENT BANNER</div>
        <div id="currentAnnouncement" style="margin-bottom:12px;color:var(--text-secondary);font-size:0.9rem;"></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <input type="text" class="form-control" id="announcementInput" placeholder="Post an announcement (leave blank to clear)..." style="flex:1;min-width:200px;"/>
          <button class="btn btn-gold" onclick="saveAnnouncement()">📢 Post</button>
          <button class="btn btn-danger btn-sm" onclick="clearAnnouncement()">✕ Clear</button>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="grid-2">
        <div class="card">
          <div class="card-title">📋 RECENT ATTENDANCE</div>
          <div id="recentAtt"></div>
        </div>
        <div class="card">
          <div class="card-title">⚔️ RECENT EVALUATIONS</div>
          <div id="recentEval"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { db, collection, doc, getDoc, setDoc, getDocs, query, orderBy } from '../../js/firebase-config.js';
  import { requireAuth, initLayout, getActiveMembers, showToast } from '../../js/app.js';

  const session = requireAuth('admin');
  if (!session) throw new Error();
  initLayout(session, 'admin-dashboard', 'ADMIN DASHBOARD');

  async function loadStats() {
    const members = await getActiveMembers();
    const evalSnap = await getDocs(collection(db, 'evaluations'));
    const quizSnap = await getDocs(collection(db, 'quiz_results'));
    const attSnap = await getDocs(collection(db, 'attendance'));
    const today = new Date().toISOString().split('T')[0];
    const todayAtt = attSnap.docs.filter(d => d.data().date === today).length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-value">${members.length}</div><div class="stat-label">Active Members</div></div>
      <div class="stat-card"><div class="stat-value green">${todayAtt}</div><div class="stat-label">Today's Attendance</div></div>
      <div class="stat-card"><div class="stat-value gold">${evalSnap.size}</div><div class="stat-label">Total Evaluations</div></div>
      <div class="stat-card"><div class="stat-value">${quizSnap.size}</div><div class="stat-label">Quiz Attempts</div></div>
    `;
  }

  async function loadAnnouncement() {
    const snap = await getDoc(doc(db, 'settings', 'site'));
    if (snap.exists() && snap.data().announcement) {
      document.getElementById('currentAnnouncement').innerHTML = `<div class="alert alert-warning">📢 Current: "${snap.data().announcement}"</div>`;
      document.getElementById('announcementInput').value = snap.data().announcement;
    } else {
      document.getElementById('currentAnnouncement').textContent = 'No active announcement.';
    }
  }

  window.saveAnnouncement = async function() {
    const msg = document.getElementById('announcementInput').value.trim();
    const snap = await getDoc(doc(db, 'settings', 'site'));
    const data = snap.exists() ? snap.data() : {};
    await setDoc(doc(db, 'settings', 'site'), { ...data, announcement: msg });
    showToast(msg ? 'Announcement posted!' : 'Announcement cleared!', 'success');
    loadAnnouncement();
    // Send push notification to all members
    if (msg) {
      const { sendNotificationToAll } = await import('../../js/notifications.js');
      await sendNotificationToAll("📢 New Announcement", msg, 'announcement');
    }
  };

  window.clearAnnouncement = async function() {
    document.getElementById('announcementInput').value = '';
    saveAnnouncement();
  };

  async function loadRecent() {
    const attSnap = await getDocs(collection(db, 'attendance'));
    const atts = attSnap.docs.map(d => d.data()).sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp)).slice(0,6);
    document.getElementById('recentAtt').innerHTML = atts.length ? atts.map(a => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;">
        <span style="color:var(--text-primary);">${a.memberName}</span>
        <span style="color:var(--accent-green);">${a.date}</span>
      </div>`).join('') : '<div style="color:var(--text-muted);">No records yet.</div>';

    const evalSnap = await getDocs(collection(db, 'evaluations'));
    const evals = evalSnap.docs.map(d => d.data()).sort((a,b) => new Date(b.submittedAt)-new Date(a.submittedAt)).slice(0,6);
    document.getElementById('recentEval').innerHTML = evals.length ? evals.map(e => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;">
        <span style="color:var(--text-primary);">${e.evaluatorName} → ${e.evaluatedName}</span>
        <span style="color:var(--accent-cyan);">${e.taskName||''}</span>
      </div>`).join('') : '<div style="color:var(--text-muted);">No evaluations yet.</div>';
  }

  loadStats();
  loadAnnouncement();
  loadRecent();
</script>
</body>
</html>
