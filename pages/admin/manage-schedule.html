<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Schedule — Admin</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <style>
    .week-nav {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--bg-card); border:1px solid var(--border-glow);
      border-radius:10px; padding:14px 20px; margin-bottom:24px;
    }
    .week-label {
      font-family:'Orbitron',monospace; font-size:0.85rem;
      color:var(--accent-gold); letter-spacing:2px; text-align:center;
    }
    .week-nav-btn {
      background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3);
      color:var(--accent-gold); border-radius:6px; padding:8px 16px;
      cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:0.9rem;
      font-weight:600; transition:all 0.2s;
    }
    .week-nav-btn:hover { background:rgba(255,215,0,0.2); }

    .day-row {
      background:var(--bg-card); border:1px solid var(--border-glow);
      border-radius:10px; margin-bottom:14px; overflow:hidden;
    }
    .day-row.today { border-color:var(--accent-green); }

    .day-label {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 20px; background:rgba(255,215,0,0.05);
      border-bottom:1px solid var(--border-glow); flex-wrap:wrap; gap:10px;
    }
    .day-name {
      font-family:'Orbitron',monospace; font-size:0.85rem;
      color:var(--text-primary); letter-spacing:1px;
    }
    .day-name.today-text { color:var(--accent-green); }
    .day-date { font-family:'Share Tech Mono',monospace; font-size:0.78rem; color:var(--text-muted); }
    .today-badge {
      background:rgba(0,255,136,0.15); border:1px solid rgba(0,255,136,0.4);
      color:var(--accent-green); border-radius:20px; padding:2px 10px;
      font-size:0.68rem; font-family:'Orbitron',monospace;
    }

    .day-tasks { padding:12px 20px; }
    .no-task { color:var(--text-muted); font-size:0.85rem; font-style:italic; padding:4px 0 8px; }

    .task-admin-row {
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:12px; padding:10px 14px; background:var(--bg-secondary);
      border:1px solid var(--border-glow); border-radius:8px; margin-bottom:8px;
    }
    .task-admin-row:last-of-type { margin-bottom:8px; }
    .task-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-cyan); margin-top:6px; flex-shrink:0; box-shadow:0 0 6px var(--accent-cyan); }
    .task-admin-title { font-size:0.9rem; font-weight:600; color:var(--text-primary); margin-bottom:3px; }
    .task-admin-desc { font-size:0.82rem; color:var(--text-secondary); line-height:1.5; }
    .task-admin-btns { display:flex; gap:6px; flex-shrink:0; }

    .add-task-btn {
      width:100%; padding:8px; background:rgba(255,215,0,0.06);
      border:1px dashed rgba(255,215,0,0.3); border-radius:8px;
      color:var(--accent-gold); cursor:pointer; font-family:'Rajdhani',sans-serif;
      font-size:0.85rem; font-weight:600; transition:all 0.2s; margin-top:4px;
    }
    .add-task-btn:hover { background:rgba(255,215,0,0.12); border-color:rgba(255,215,0,0.5); }
  </style>
</head>
<body>
<div id="mobileTopbar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <span class="topbar-title" style="color:var(--accent-gold);">MANAGE SCHEDULE</span>
      <div class="topbar-right"><span class="topbar-time" id="topbarTime"></span></div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1>WEEKLY SCHEDULE</h1>
          <p>Add tasks to any day — all data saved permanently</p>
        </div>
      </div>

      <!-- Week navigation -->
      <div class="week-nav">
        <button class="week-nav-btn" onclick="changeWeek(-1)">← Previous</button>
        <div class="week-label" id="weekLabel">Loading...</div>
        <button class="week-nav-btn" onclick="changeWeek(1)">Next →</button>
      </div>

      <!-- Days -->
      <div id="scheduleGrid"></div>
    </div>
  </main>
</div>
<div class="toast-container" id="toastContainer"></div>

<!-- Add/Edit Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">📅 ADD TASK</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="taskModalDayLabel" style="font-family:'Share Tech Mono',monospace;font-size:0.82rem;color:var(--accent-cyan);margin-bottom:20px;"></div>
    <div class="form-group">
      <label class="form-label">Task Title *</label>
      <input type="text" class="form-control" id="taskTitle" placeholder="e.g. GD #3, Lecturette #2, WAT Session"/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control" id="taskDesc" rows="3" placeholder="Topic, instructions, or any notes..."></textarea>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px;">
      <button class="btn" onclick="closeModal()" style="border:1px solid var(--border-glow);color:var(--text-secondary);">Cancel</button>
      <button class="btn btn-gold" onclick="saveTask()">💾 Save Task</button>
    </div>
  </div>
</div>

<script type="module">
  import { db, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, query, where } from '../../js/firebase-config.js';
  import { requireAuth, initLayout, showToast } from '../../js/app.js';

  const session = requireAuth('admin');
  if (!session) throw new Error();
  initLayout(session, 'manage-schedule', 'MANAGE SCHEDULE');

  // IST helpers
  function getTodayIST() {
    // Get today's date string directly in IST — no conversion needed
    return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
    // en-CA gives YYYY-MM-DD format natively
  }

  function getMonday(dateStr) {
    // Work with date strings only — avoids all timezone shifting
    const [y, m, d] = dateStr.split('-').map(Number);
    const date = new Date(y, m - 1, d); // local date, no timezone
    const day = date.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    date.setDate(date.getDate() + diff);
    return date;
  }

  function formatDate(d) {
    // Format without toISOString to avoid UTC shift
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatIndian(d) {
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric', timeZone:'Asia/Kolkata' });
  }

  function formatDayName(d) {
    return d.toLocaleDateString('en-IN', { weekday:'long', timeZone:'Asia/Kolkata' });
  }

 const todayStr = getTodayIST();
  let currentMonday = getMonday(todayStr);

  // Modal state
  let editingTaskId = null;
  let activeDate = null;
  let activeDayLabel = '';

  function getWeekDates(monday) {
    return Array.from({length:7}, (_,i) => {
      const d = new Date(monday);
      d.setDate(d.getDate() + i);
      return d;
    });
  }

  async function loadWeek() {
    const dates = getWeekDates(currentMonday);
    const startStr = formatDate(dates[0]);
    const endStr   = formatDate(dates[6]);

    document.getElementById('weekLabel').textContent =
      `${formatIndian(dates[0])} — ${formatIndian(dates[6])}`;

    const snap = await getDocs(query(
      collection(db, 'schedule'),
      where('date', '>=', startStr),
      where('date', '<=', endStr)
    ));
    const tasks = snap.docs.map(d => ({id:d.id,...d.data()}));

    const grid = document.getElementById('scheduleGrid');
    grid.innerHTML = '';

    dates.forEach(date => {
      const dateStr  = formatDate(date);
      const dayName  = formatDayName(date);
      const dayDate  = date.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric', timeZone:'Asia/Kolkata' });
      const isToday  = dateStr === todayStr;
      const dayTasks = tasks.filter(t => t.date === dateStr)
        .sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''));

      const row = document.createElement('div');
      row.className = `day-row${isToday ? ' today' : ''}`;
      row.innerHTML = `
        <div class="day-label">
          <div>
            <div class="day-name${isToday?' today-text':''}">${dayName}</div>
            <div class="day-date">${dayDate}</div>
          </div>
          ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
        </div>
        <div class="day-tasks" id="daytasks_${dateStr}">
          ${dayTasks.length === 0
            ? '<div class="no-task">No tasks scheduled for this day</div>'
            : dayTasks.map(t => `
                <div class="task-admin-row">
                  <div class="task-dot" style="margin-top:6px;"></div>
                  <div style="flex:1;">
                    <div class="task-admin-title">${t.title}</div>
                    ${t.description ? `<div class="task-admin-desc">${t.description}</div>` : ''}
                  </div>
                  <div class="task-admin-btns">
                    <button class="btn btn-primary btn-sm" onclick="openEditModal('${t.id}','${dateStr}','${dayName}, ${dayDate}')">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">🗑️</button>
                  </div>
                </div>`).join('')}
          <button class="add-task-btn" onclick="openAddModal('${dateStr}','${dayName}, ${dayDate}')">+ Add Task to ${dayName}</button>
        </div>`;
      grid.appendChild(row);
    });
  }

  window.changeWeek = function(dir) {
    currentMonday.setDate(currentMonday.getDate() + dir * 7);
    loadWeek();
  };

  // ── MODAL ──
  window.openAddModal = function(dateStr, dayLabel) {
    editingTaskId = null;
    activeDate = dateStr;
    activeDayLabel = dayLabel;
    document.getElementById('taskModalTitle').textContent = '📅 ADD TASK';
    document.getElementById('taskModalDayLabel').textContent = '📆 ' + dayLabel;
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskModal').classList.add('active');
    setTimeout(() => document.getElementById('taskTitle').focus(), 100);
  };

  window.openEditModal = async function(taskId, dateStr, dayLabel) {
    editingTaskId = taskId;
    activeDate = dateStr;
    activeDayLabel = dayLabel;
    const snap = await getDocs(query(collection(db,'schedule'), where('__name__','==',taskId)));
    // Use getDoc instead
    const { doc: firestoreDoc, getDoc } = await import('../../js/firebase-config.js');
    const d = await getDoc(firestoreDoc(db, 'schedule', taskId));
    const t = d.data();
    document.getElementById('taskModalTitle').textContent = '✏️ EDIT TASK';
    document.getElementById('taskModalDayLabel').textContent = '📆 ' + dayLabel;
    document.getElementById('taskTitle').value = t.title || '';
    document.getElementById('taskDesc').value = t.description || '';
    document.getElementById('taskModal').classList.add('active');
    setTimeout(() => document.getElementById('taskTitle').focus(), 100);
  };

  window.closeModal = function() {
    document.getElementById('taskModal').classList.remove('active');
    editingTaskId = null; activeDate = null;
  };

  window.saveTask = async function() {
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) { showToast('Task title is required','error'); return; }
    const description = document.getElementById('taskDesc').value.trim();
    try {
      if (editingTaskId) {
        await updateDoc(doc(db,'schedule',editingTaskId), { title, description });
        showToast('Task updated!','success');
      } else {
        await addDoc(collection(db,'schedule'), {
          title, description, date: activeDate,
          createdAt: new Date().toISOString()
        });
        showToast('Task added!','success');
      }
      closeModal();
      loadWeek();
    } catch(e) { showToast('Error saving task','error'); console.error(e); }
  };

  window.deleteTask = async function(taskId) {
    if (!confirm('Delete this scheduled task?')) return;
    await deleteDoc(doc(db,'schedule',taskId));
    showToast('Task deleted','success');
    loadWeek();
  };

  // Enter key in title field
  document.getElementById('taskTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.saveTask();
  });

  loadWeek();
</script>
</body>
</html>
