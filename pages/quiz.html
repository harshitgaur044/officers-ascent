<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Center — The Officer's Ascent</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .quiz-card { cursor:pointer; transition:all 0.3s; }
    .quiz-card:hover { border-color:var(--accent-cyan); transform:translateY(-2px); }
    .option-btn { width:100%; padding:14px 18px; background:rgba(255,255,255,0.03); border:1px solid var(--border-glow); border-radius:8px; color:var(--text-primary); font-family:'Rajdhani',sans-serif; font-size:1rem; text-align:left; cursor:pointer; transition:all 0.2s; margin-bottom:10px; }
    .option-btn:hover { border-color:var(--accent-cyan); background:rgba(0,180,255,0.08); }
    .option-btn.selected { border-color:var(--accent-cyan); background:rgba(0,180,255,0.15); color:var(--accent-cyan); }
    .option-btn.correct { border-color:var(--accent-green); background:rgba(0,255,136,0.15); color:var(--accent-green); }
    .option-btn.wrong { border-color:var(--accent-red); background:rgba(255,68,68,0.15); color:var(--accent-red); }
    .timer-display { font-family:'Orbitron',monospace; font-size:2rem; color:var(--accent-cyan); text-align:center; margin-bottom:20px; }
    .timer-display.warning { color:var(--accent-red); animation:glow-pulse 0.5s infinite; }
    .progress-question { display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap; }
    .q-dot { width:24px; height:24px; border-radius:50%; background:var(--bg-secondary); border:1px solid var(--border-glow); display:flex; align-items:center; justify-content:center; font-size:0.65rem; color:var(--text-muted); cursor:pointer; transition:all 0.2s; }
    .q-dot.answered { background:rgba(0,180,255,0.3); border-color:var(--accent-cyan); color:var(--accent-cyan); }
    .q-dot.current { background:var(--accent-cyan); color:#000; font-weight:700; }
  </style>
</head>
<body>
<div id="mobileTopbar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <span class="topbar-title">QUIZ CENTER</span>
      <div class="topbar-right"><span class="topbar-time" id="topbarTime"></span></div>
    </div>
    <div class="page-content">

      <!-- QUIZ LIST -->
      <div id="quizList">
        <div class="page-header">
          <div class="page-header-left"><h1>QUIZ CENTER</h1><p>Test your SSB knowledge</p></div>
        </div>
        <div id="quizGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
      </div>

      <!-- QUIZ ATTEMPT -->
      <div id="quizAttempt" class="hidden">
        <div class="flex items-center gap-12 mb-24">
          <button class="btn btn-sm" onclick="exitQuiz()" style="border:1px solid var(--border-glow);color:var(--text-secondary);">✕ Exit</button>
          <div id="quizAttemptTitle" class="card-title" style="margin:0;"></div>
          <div style="margin-left:auto;">
            <div class="timer-display" id="timerDisplay">--:--</div>
          </div>
        </div>
        <div class="progress-question" id="qDots"></div>
        <div class="card" id="questionCard"></div>
        <div style="display:flex;justify-content:space-between;margin-top:16px;">
          <button class="btn btn-sm" id="prevBtn" onclick="prevQuestion()" style="border:1px solid var(--border-glow);color:var(--text-secondary);">← Prev</button>
          <span id="qCounter" style="color:var(--text-muted);font-family:'Share Tech Mono',monospace;align-self:center;"></span>
          <button class="btn btn-primary btn-sm" id="nextBtn" onclick="nextQuestion()">Next →</button>
        </div>
        <div class="text-center mt-16">
          <button class="btn btn-success btn-lg" onclick="submitQuiz()">🚀 SUBMIT QUIZ</button>
        </div>
      </div>

      <!-- RESULT -->
      <div id="quizResult" class="hidden">
        <div class="card text-center" style="max-width:480px;margin:0 auto;padding:40px;">
          <div style="font-size:4rem;margin-bottom:16px;" id="resultEmoji"></div>
          <div class="card-title" style="font-size:1.2rem;margin-bottom:8px;" id="resultTitle"></div>
          <div style="font-family:'Orbitron',monospace;font-size:3rem;color:var(--accent-green);margin-bottom:16px;" id="resultScore"></div>
          <div style="color:var(--text-secondary);margin-bottom:24px;" id="resultDetail"></div>
          <button class="btn btn-primary" onclick="document.getElementById('quizResult').classList.add('hidden');document.getElementById('quizList').classList.remove('hidden');loadQuizzes();">Back to Quizzes</button>
        </div>
      </div>

      <!-- PAST RESULTS -->
      <div class="card mt-24" id="pastResultsSection">
        <div class="card-title">📊 YOUR PAST RESULTS</div>
        <div id="pastResults"></div>
      </div>

    </div>
  </main>
</div>
<div id="bottomNav"></div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { db, collection, doc, getDoc, getDocs, addDoc, query, where, orderBy } from '../js/firebase-config.js';
  import { requireAuth, initLayout, showToast } from '../js/app.js';

  const session = requireAuth();
  if (!session) throw new Error();
  initLayout(session, 'quiz', 'QUIZ CENTER');

  let quizzes = [], attemptedIds = new Set();
  let currentQuiz = null, questions = [], answers = {}, currentQ = 0, timerInterval = null;

  async function loadQuizzes() {
    const snap = await getDocs(collection(db, 'quizzes'));
    quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (session.role !== 'admin') {
      const mySnap = await getDocs(query(collection(db, 'quiz_results'), where('memberId','==',session.id)));
      mySnap.forEach(d => attemptedIds.add(d.data().quizId));
    }

    const grid = document.getElementById('quizGrid');
    if (quizzes.length === 0) { grid.innerHTML = '<div class="alert alert-info">No quizzes available yet. Check back soon!</div>'; return; }
    grid.innerHTML = quizzes.map(q => `
      <div class="card quiz-card" onclick="${(session.role!=='admin' && attemptedIds.has(q.id)) ? '' : `startQuiz('${q.id}')`}">
        <div style="font-family:'Orbitron',monospace;font-size:0.9rem;color:var(--text-primary);margin-bottom:8px;">${q.title}</div>
        <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;">⏱ ${q.timeLimit} min · ${q.questionCount || '?'} questions</div>
        ${(session.role!=='admin' && attemptedIds.has(q.id))
          ? `<div class="submitted-badge">✅ Already Attempted</div>`
          : `<button class="btn btn-primary btn-sm">Start Quiz →</button>`}
      </div>`).join('');

    loadPastResults();
  }

  window.startQuiz = async function(quizId) {
    if (session.role !== 'admin' && attemptedIds.has(quizId)) { showToast('Already attempted!', 'info'); return; }
    currentQuiz = quizzes.find(q => q.id === quizId);
    const qSnap = await getDocs(query(collection(db, 'quiz_questions'), where('quizId','==',quizId)));
    questions = qSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (questions.length === 0) { showToast('No questions in this quiz yet.', 'info'); return; }
    answers = {};
    currentQ = 0;
    document.getElementById('quizList').classList.add('hidden');
    document.getElementById('pastResultsSection').classList.add('hidden');
    document.getElementById('quizAttempt').classList.remove('hidden');
    document.getElementById('quizAttemptTitle').textContent = currentQuiz.title;
    renderQuestion();
    startTimer(currentQuiz.timeLimit * 60);
  };

  function renderQuestion() {
    const q = questions[currentQ];
    document.getElementById('qCounter').textContent = `${currentQ+1} / ${questions.length}`;
    document.getElementById('prevBtn').disabled = currentQ === 0;
    document.getElementById('nextBtn').style.display = currentQ === questions.length-1 ? 'none' : 'inline-flex';

    // Q dots
    document.getElementById('qDots').innerHTML = questions.map((_, i) => `
      <div class="q-dot ${i === currentQ ? 'current' : answers[questions[i].id] !== undefined ? 'answered' : ''}" onclick="jumpTo(${i})">${i+1}</div>`).join('');

    const opts = ['a','b','c','d'];
    document.getElementById('questionCard').innerHTML = `
      <div style="font-size:1rem;color:var(--text-primary);margin-bottom:20px;line-height:1.6;">${currentQ+1}. ${q.question}</div>
      ${opts.map(o => q[`option_${o}`] ? `
        <button class="option-btn ${answers[q.id]===o?'selected':''}" onclick="selectAnswer('${q.id}','${o}')">${o.toUpperCase()}. ${q[`option_${o}`]}</button>
      ` : '').join('')}
    `;
  }

  window.selectAnswer = function(qId, opt) {
    answers[qId] = opt;
    renderQuestion();
  };

  window.jumpTo = function(i) { currentQ = i; renderQuestion(); };
  window.prevQuestion = function() { if (currentQ > 0) { currentQ--; renderQuestion(); } };
  window.nextQuestion = function() { if (currentQ < questions.length-1) { currentQ++; renderQuestion(); } };

  function startTimer(seconds) {
    let remaining = seconds;
    timerInterval = setInterval(() => {
      remaining--;
      const m = Math.floor(remaining/60).toString().padStart(2,'0');
      const s = (remaining%60).toString().padStart(2,'0');
      const el = document.getElementById('timerDisplay');
      el.textContent = `${m}:${s}`;
      el.className = `timer-display${remaining < 60 ? ' warning' : ''}`;
      if (remaining <= 0) { clearInterval(timerInterval); submitQuiz(); }
    }, 1000);
  }

  window.exitQuiz = function() {
    clearInterval(timerInterval);
    document.getElementById('quizAttempt').classList.add('hidden');
    document.getElementById('quizList').classList.remove('hidden');
    document.getElementById('pastResultsSection').classList.remove('hidden');
  };

  window.submitQuiz = async function() {
    clearInterval(timerInterval);
    let correct = 0;
    questions.forEach(q => { if (answers[q.id] === q.correct_option) correct++; });
    const score = Math.round((correct / questions.length) * 100);

    try {
      await addDoc(collection(db, 'quiz_results'), {
        memberId: session.id, memberName: session.name,
        quizId: currentQuiz.id, quizTitle: currentQuiz.title,
        score, correct, total: questions.length,
        submittedAt: new Date().toISOString()
      });
      attemptedIds.add(currentQuiz.id);
    } catch(e) {}

    document.getElementById('quizAttempt').classList.add('hidden');
    document.getElementById('quizResult').classList.remove('hidden');

    const emoji = score >= 80 ? '🏆' : score >= 60 ? '🎯' : score >= 40 ? '📚' : '💪';
    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultTitle').textContent = score >= 80 ? 'Excellent Performance!' : score >= 60 ? 'Good Job!' : 'Keep Practicing!';
    document.getElementById('resultScore').textContent = `${score}%`;
    document.getElementById('resultDetail').textContent = `${correct} correct out of ${questions.length} questions`;
  };

  async function loadPastResults() {
    if (session.role === 'admin') return;
    const snap = await getDocs(query(collection(db, 'quiz_results'), where('memberId','==',session.id), orderBy('submittedAt','desc')));
    const el = document.getElementById('pastResults');
    if (snap.empty) { el.innerHTML = '<div style="color:var(--text-muted);">No quiz attempts yet.</div>'; return; }
    el.innerHTML = `<div class="table-wrapper"><table><thead><tr><th>Quiz</th><th>Score</th><th>Correct</th><th>Date</th></tr></thead><tbody>
      ${snap.docs.map(d => { const r=d.data(); return `<tr>
        <td>${r.quizTitle}</td>
        <td><span style="color:${r.score>=80?'var(--accent-green)':r.score>=60?'var(--accent-cyan)':'var(--accent-red)'};font-family:'Orbitron',monospace;">${r.score}%</span></td>
        <td>${r.correct}/${r.total}</td>
        <td style="color:var(--text-muted);">${new Date(r.submittedAt).toLocaleDateString('en-IN')}</td>
      </tr>`; }).join('')}
    </tbody></table></div>`;
  }

  loadQuizzes();
</script>
</body>
</html>
